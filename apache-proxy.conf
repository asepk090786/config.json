# Apache mod_proxy example for token.belajar2026.net
# Enable: a2enmod proxy proxy_http proxy_balancer lbmethod_byrequests
# Then include this config in the vhost.
<IfModule mod_proxy.c>
  <VirtualHost *:80>
    ServerName token.belajar2026.net

    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass /api/ http://127.0.0.1:3000/
    ProxyPassReverse /api/ http://127.0.0.1:3000/

    <Location /api/>
      Require all granted
    </Location>
  </VirtualHost>
</IfModule>
