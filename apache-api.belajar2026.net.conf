<VirtualHost *:80>
  ServerName api.belajar2026.net

  ProxyPreserveHost On
  ProxyRequests Off

  ProxyPass /api/ http://127.0.0.1:3000/
  ProxyPassReverse /api/ http://127.0.0.1:3000/

  <Location /api/>
    Require all granted
  </Location>

  DocumentRoot /www/wwwroot/api.belajar2026.net
  <Directory /www/wwwroot/api.belajar2026.net>
    Require all granted
    AllowOverride None
  </Directory>
</VirtualHost>
